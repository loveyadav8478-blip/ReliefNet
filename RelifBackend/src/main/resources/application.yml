server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}

    hikari:
      maximum-pool-size: 5
      auto-commit: true
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT}
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

  web:
    resources:
      static-locations: ${STATIC_RESOURCES}

# ---- AI (Gemini) ----
gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL}

# ---- App Config ----
app:
  coordinator:
    invite-code: ${COORDINATOR_INVITE_CODE}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  matching:
    max-results: 5
    default-radius-km: 20

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION}

  upload:
    dir: ${UPLOAD_DIR}

# ---- Logging ----
logging:
  level:
    com:
      hackathon: DEBUG
    org:
      springframework:
        web: INFO